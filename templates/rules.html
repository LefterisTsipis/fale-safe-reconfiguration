<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Rules</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        button {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>Rules</h1>
    <table>
        <thead>
            <tr>
                <th>Rule ID</th>
                <th>Category</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="rules-table-body">
            {% for rule in rules %}
            <tr>
                <td>{{ rule.rule_id }}</td>
                <td>{{ rule.category }}</td>
                <td>{{ rule.description }}</td>
                <td>
                    <button class="delete-button" data-id="{{ rule.rule_id }}">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>


    <script>
        $(document).ready(function() {
            // Handle the button click event for delete
            $('.delete-button').on('click', function() {
                const ruleId = $(this).data('id'); // Get the rule ID
                const confirmation = confirm(`Are you sure you want to delete Rule ID ${ruleId}?`);

                if (confirmation) {
                    $.ajax({
                        url: 'http://localhost:8000/sdn_app/api/block-compromised-host/', // Ensure this URL is correct
                        type: 'DELETE',
                        contentType: 'application/json', // Specify content type
                        data: JSON.stringify({
                            'rule_id': ruleId // Send the rule ID in the request body
                        }),
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}' // Include CSRF token
                        },
                        success: function(response) {
                            alert(`Success: ${response.message}`); // Show success message
                             window.location.href = '/sdn_applicatrion/ui/servers_ui'; // Redirect to admin panel
                        },
                        error: function(xhr, status, error) {
                            console.error('Error:', error);
                            alert(`Error: ${xhr.status}, ${xhr.responseText}`); // Show error message
                        }
                    });
                }
            });
        });
    </script>




</body>
</html>
