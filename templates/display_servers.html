<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Servers</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        button {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>Servers</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="server-table-body">
            {% for server in servers %}
            <tr>
                <td>{{ server.host.id }}</td>
                <td>{{ server.host.ip }}</td>
                <td>
                    <button class="compromise-button" data-id="{{ server.host.pk }}">Report Compromised</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        $(document).ready(function() {
            $('.compromise-button').on('click', function() {
                const serverId = $(this).data('id');
                console.log('Server ID:', serverId);

                $.ajax({
                    url: '{% url "block_compromised_host" %}',
                    type: 'POST',
                    data: {
                        compromised_server: serverId,
                        csrfmiddlewaretoken: '{{ csrf_token }}'
                    },
                    success: function(response) {
                        alert(`Success: ${response.message}`); // Show success message
                            window.location.href = '/sdn_app/api/rules'; // Redirect to admin panel
                    },
                    error: function(xhr, status, error) {
                        console.error("status:", xhr.status);
                        console.error("response:", xhr.responseText);
                        console.error("error:", error);
                    }
                });
            });
        });
    </script>
</body>
</html>
