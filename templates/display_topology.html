<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Role Assignment</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: #fff;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background-color: #45a049;
        }

        input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }
    </style>




</head>
<body>
    <h1>Assign Roles to Hosts</h1>

    <table border="1" id="json-table">
        <thead>
            <tr>
                <th>Host</th>
                <th>MAC Address</th>
                <th>Switch Mapping</th>
                <th>Port Mapping</th>
                <th>Is Server?</th>
                <th>Is Client?</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Rows will be inserted here via JavaScript -->
        </tbody>
    </table>

    <!-- Button to trigger POST request -->
    <button id="submit-button">Submit Roles</button>

    <script>
        // JSON data passed from Django view
        const data = {{ json_data|safe }};

        // Extract relevant parts of the JSON data
        const hostMacInfo = data.host_mac_info;
        const hostSwitchMapping = data.host_switch_mapping;
        const hostPortMapping = data.host_port_mapping_to_switch;

        const tableBody = document.getElementById('table-body');

        // Loop through the host_mac_info object and add rows to the table
        for (const host in hostMacInfo) {
            if (hostMacInfo.hasOwnProperty(host)) {
                const macAddress = hostMacInfo[host];
                const switchMapping = hostSwitchMapping[host];
                const portMapping = hostPortMapping[host];

                const row = document.createElement('tr');

                const hostCell = document.createElement('td');
                const macCell = document.createElement('td');
                const switchCell = document.createElement('td');
                const portCell = document.createElement('td');
                const serverCell = document.createElement('td');
                const clientCell = document.createElement('td');

                hostCell.textContent = host;
                macCell.textContent = macAddress;
                switchCell.textContent = switchMapping;
                portCell.textContent = portMapping;

                // Add checkboxes for server and client selection
                const serverCheckbox = document.createElement('input');
                serverCheckbox.type = 'checkbox';
                serverCheckbox.classList.add('server-checkbox');
                serverCheckbox.value = host;
                serverCell.appendChild(serverCheckbox);

                const clientCheckbox = document.createElement('input');
                clientCheckbox.type = 'checkbox';
                clientCheckbox.classList.add('client-checkbox');
                clientCheckbox.value = host;
                clientCell.appendChild(clientCheckbox);

                // Append cells to the row
                row.appendChild(hostCell);
                row.appendChild(macCell);
                row.appendChild(switchCell);
                row.appendChild(portCell);
                row.appendChild(serverCell);
                row.appendChild(clientCell);

                // Append the row to the table body
                tableBody.appendChild(row);
            }
        }

        // Event listener for the submit button
        document.getElementById('submit-button').addEventListener('click', function () {
            // Gather selected server and client IPs
            const servers = [];
            const clients = [];

            // Collect servers
            document.querySelectorAll('.server-checkbox:checked').forEach(function (checkbox) {
                servers.push(checkbox.value);
            });

            // Collect clients
            document.querySelectorAll('.client-checkbox:checked').forEach(function (checkbox) {
                clients.push(checkbox.value);
            });

            // Create the payload
            const payload = {
                servers_ips: servers,
                clients_ips: clients
            };

            console.log('Submitting Roles:', payload);

            // Make the POST request
            fetch('http://127.0.0.1:8000/sdn_app/api/client_server_role', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') // Fetch CSRF token
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                  // Pop up the response message
                window.location.href = '/admin/';
                console.log('Success:', data);
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        });

        // Function to get the CSRF token for Django POST request
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
